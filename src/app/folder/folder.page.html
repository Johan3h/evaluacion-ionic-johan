<ion-header [translucent]="true">
  <ion-toolbar color="tertiary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ folder }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <!-- CONTENIDO PARA INICIO -->
  <div *ngIf="folder === 'inicio'">
    <ion-card>
      <img src="https://ionicframework.com/docs/img/demos/card-media.png" />
      <ion-card-header>
        <ion-card-title>Bienvenido a la Evaluación</ion-card-title>
        <ion-card-subtitle>Desarrollo Móvil con Ionic</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        Esta aplicación ha sido desarrollada para demostrar el manejo de navegación lateral y vistas dinámicas en Angular.
      </ion-card-content>
    </ion-card>
  </div>

  <!-- CONTENIDO PARA INFORMACIÓN PERSONAL -->
  <div *ngIf="folder === 'informacion'">
    <ion-list lines="inset">
      <ion-item>
        <ion-icon name="person-circle" slot="start" color="primary"></ion-icon>
        <ion-label>
          <h2>Johan Gonzalez</h2>
          <p>Estudiante de Informática</p>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-icon name="school" slot="start" color="secondary"></ion-icon>
        <ion-label>Institución: UNETI</ion-label>
      </ion-item>
    </ion-list>
  </div>

  <!-- CONTENIDO PARA CONTACTO -->
  <div *ngIf="folder === 'contacto'">
    <ion-item fill="outline" mode="md" class="ion-margin-bottom">
      <ion-label position="floating">Mensaje</ion-label>
      <ion-textarea placeholder="Escribe tu duda técnica aquí..."></ion-textarea>
    </ion-item>
    <ion-button expand="block" shape="round">Enviar Contacto</ion-button>
  </div>

</ion-content>
